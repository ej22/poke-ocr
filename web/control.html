<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CodexOCR Control</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body class="control-shell">
    <main class="control-grid">
      <section class="panel status-panel">
        <div>
          <p class="eyebrow">CodexOCR</p>
          <h1>Pokémon Card Scanner</h1>
        </div>
        <div id="scan-state" class="state-pill">Loading</div>
        <div id="current-card" class="card-readout"></div>
      </section>

      <section class="panel">
        <h2>Settings</h2>
        <form id="settings-form" class="form-grid">
          <label>
            PokéWallet API key
            <input name="pokewallet_api_key" type="password" autocomplete="off" placeholder="Stored locally" />
          </label>
          <label>
            Currency
            <input name="currency" value="USD" />
          </label>
          <label>
            Camera ID
            <input name="camera_id" value="default" />
          </label>
          <label>
            Overlay layout
            <select name="overlay_layout">
              <option value="lower-third">Lower third</option>
              <option value="compact">Compact</option>
              <option value="full">Full</option>
            </select>
          </label>
          <button type="submit">Save Settings</button>
        </form>
      </section>

      <section class="panel">
        <h2>Camera</h2>
        <div class="camera-frame">
          <video id="camera-preview" playsinline muted></video>
          <canvas id="camera-canvas" hidden></canvas>
        </div>
        <div class="button-row">
          <button id="start-camera-button" type="button">Start Camera</button>
          <button id="scan-frame-button" type="button">Scan Frame</button>
        </div>
        <p id="camera-message" class="muted">Camera frames stay local and are posted only to this service.</p>
      </section>

      <section class="panel">
        <h2>Manual Test Scan</h2>
        <form id="simulate-form" class="form-grid">
          <label>
            Card name
            <input name="name" value="Charizard VMAX" />
          </label>
          <label>
            Set code
            <input name="set_code" value="SWSH3" />
          </label>
          <label>
            Collector number
            <input name="collector_number" value="020/189" />
          </label>
          <label>
            Language
            <input name="language" value="en" />
          </label>
          <button type="submit">Send Test Frame</button>
        </form>
        <div class="button-row">
          <button id="pause-button" type="button">Pause</button>
          <button id="resume-button" type="button">Resume</button>
        </div>
      </section>

      <section class="panel">
        <h2>Card Index</h2>
        <form id="catalog-form" class="form-grid">
          <label>
            Pokémon TCG query
            <input name="query" placeholder="set.id:sv1 or name:charizard" />
          </label>
          <label>
            Pages
            <input name="pages" type="number" min="1" max="10" value="1" />
          </label>
          <button type="submit">Sync Card Index</button>
        </form>
        <p id="catalog-message" class="muted">The bundled sample index is enough for local smoke tests.</p>
      </section>

      <section class="panel">
        <h2>OBS Browser Source</h2>
        <input id="overlay-url" readonly value="http://127.0.0.1:8765/overlay" />
        <pre id="obs-config" class="config-block"></pre>
        <p class="muted">Add this URL as a transparent Browser Source in OBS.</p>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
